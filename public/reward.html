<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rewards - CoverageQuest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="dashboard-header">
        <h1 class="logo"><a href="dashboard.html" class="logo">Coverage Quest</a></h1>
    </header>

    <main class="dashboard-content">
        <div class="top-full-card login-card">
            <h3>Total Points</h3>
            <span class="stat-value" id="display-points">0</span>
        </div>

        <div class="middle-row-container">
            <div class="login-card featured-box">
                <h3>Featured Voucher</h3>
                <div id="featured-voucher-content">
                    <p class="placeholder-text">Check available vouchers below!</p>
                </div>
            </div>

            <div class="login-card inventory-box">
                <h3>My Inventory</h3>
                <div id="inventory-container">
                    </div>
            </div>
        </div>

        <div class="bottom-section">
            <h2 class="section-title">Available Vouchers</h2>
            <div class="dashboard-grid" id="voucher-container">
                </div>
        </div>
    </main>

    <script src="js/Reward.js"></script>
</body>
</html>
